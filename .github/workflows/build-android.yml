name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Debug Android SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/cmdline-tools/ || echo "no cmdline-tools"
          ls $ANDROID_HOME/platforms/ || echo "no platforms"

      - name: Install Android SDK platform 36
        run: |
          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager | head -1)
          echo "sdkmanager at: $SDKMANAGER"
          yes | $SDKMANAGER "platforms;android-36" "build-tools;36.0.0"
          yes | $SDKMANAGER --licenses

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: matzil-sar-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
