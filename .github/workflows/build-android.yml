name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Android SDK platform 36
        run: |
          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager | head -1)
          yes | $SDKMANAGER "platforms;android-36" "build-tools;36.0.0"
          yes | $SDKMANAGER --licenses

      - name: Create assets directory and run cap sync
        run: |
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: matzil-sar-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
