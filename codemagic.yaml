workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.matzil.sar
      vars:
        BUNDLE_ID: "org.matzil.sar"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: v20
    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build Next.js for Capacitor
        script: CAPACITOR_BUILD=1 npm run build

      - name: Capacitor sync
        script: npx cap sync ios --no-open

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install

      - name: Set entitlements path
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -target App \
            CODE_SIGN_ENTITLEMENTS=App/App.entitlements \
            -showBuildSettings > /dev/null || true

      - name: Build and archive for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
